name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --verbose

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Show available Xcodes
        run: ls /Applications/ | grep -i xcode

      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive 2>&1 | tail -30

          ls -la build/App.xcarchive/Products/Applications/ 2>/dev/null || echo "No .app directory"

          if [ -d "build/App.xcarchive/Products/Applications/App.app" ]; then
            mkdir -p Payload
            cp -R build/App.xcarchive/Products/Applications/App.app Payload/
            zip -r ../../../subnet-calc.ipa Payload
            rm -rf Payload
            ls -lh ../../../subnet-calc.ipa
          else
            echo "Archive may have different structure, checking..."
            find build -name "*.app" -type d 2>/dev/null
            APP_PATH=$(find build -name "*.app" -type d 2>/dev/null | head -1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -R "$APP_PATH" Payload/
              zip -r ../../../subnet-calc.ipa Payload
              rm -rf Payload
              ls -lh ../../../subnet-calc.ipa
            else
              echo "ERROR: No .app found"
              exit 1
            fi
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: subnet-calc.ipa
          path: subnet-calc.ipa
          if-no-files-found: error
