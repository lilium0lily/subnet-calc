name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Add iOS platform
        run: npx cap add ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive 2>&1 | tail -30

          ls -la build/App.xcarchive/Products/Applications/

          mkdir -p Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r ../subnet-calc.ipa Payload
          rm -rf Payload
          ls -lh ../subnet-calc.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: subnet-calc.ipa
          path: ios/subnet-calc.ipa
          if-no-files-found: error
