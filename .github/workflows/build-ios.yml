name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build iOS App (unsigned IPA)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" || true

          # Create .ipa from .app
          if [ -d "build/App.xcarchive/Products/Applications/App.app" ]; then
            mkdir -p Payload
            cp -R build/App.xcarchive/Products/Applications/App.app Payload/
            zip -r ../../../subnet-calc.ipa Payload
            rm -rf Payload
            echo "✅ IPA created successfully"
          else
            echo "⚠️  Archive may have been created; checking..."
            ls -la build/App.xcarchive/Products/Applications/ 2>/dev/null || echo "No .app found"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: subnet-calc.ipa
          path: subnet-calc.ipa
          if-no-files-found: warn
